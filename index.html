<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Outfit Style Visualizer Pro</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth color and shape transitions */
        svg path, svg circle {
            transition: fill 0.3s ease-in-out, stroke 0.3s ease-in-out;
        }
        /* Hide scrollbars for a clean mobile UI */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 antialiased min-h-screen flex items-center justify-center p-4 md:p-8">

    <main class="max-w-4xl w-full bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col">
        
        <!-- Header -->
        <header class="text-center py-5 bg-white border-b border-slate-100 shadow-sm z-10">
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Outfit Visualizer Pro</h1>
            <p class="text-sm text-slate-500 mt-1">Mix styles, silhouettes & colors to find your aesthetic</p>
        </header>

        <!-- Preview Area -->
        <div class="bg-slate-50 p-6 flex flex-col items-center justify-center border-b border-slate-200 relative overflow-hidden">
            <!-- Ambient Background -->
            <div class="absolute w-80 h-80 bg-blue-100 rounded-full blur-3xl opacity-50 mix-blend-multiply pointer-events-none"></div>
            
            <!-- Gender Toggle -->
            <div class="relative z-20 mb-6 bg-white p-1 rounded-full shadow-sm border border-slate-200 flex gap-1">
                <button id="btn-male" onclick="setGender('male')" class="px-6 py-1.5 text-sm font-semibold rounded-full transition-colors bg-indigo-500 text-white shadow">Male Body</button>
                <button id="btn-female" onclick="setGender('female')" class="px-6 py-1.5 text-sm font-semibold rounded-full transition-colors text-slate-600 hover:bg-slate-100">Female Body</button>
            </div>

            <!-- UNIFIED SVG CANVAS -->
            <div class="relative drop-shadow-xl flex flex-col items-center justify-center h-80 w-full pb-4">
                <svg viewBox="0 0 200 360" class="w-auto h-full z-10 relative">
                    
                    <!-- 1. BASE BODY -->
                    <path id="body-path" d="" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1.5"/>
                    
                    <!-- 2. BOTTOMS -->
                    <path id="bottoms-path" d="" fill="#172554" stroke="#1e293b" stroke-width="2.5" stroke-linejoin="round"/>
                    
                    <!-- 3. TOPS -->
                    <path id="tops-path" d="" fill="#f8fafc" stroke="#1e293b" stroke-width="2.5" stroke-linejoin="round"/>
                    
                    <!-- 4. SHOES -->
                    <path id="shoes-path" d="" fill="#78350f" stroke="#1e293b" stroke-width="2.5" stroke-linejoin="round"/>

                </svg>
            </div>
        </div>

        <!-- Controls Area -->
        <div class="p-6 md:p-8 bg-white flex flex-col gap-8">
            
            <!-- Garment Type Selectors -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 border-b border-slate-100 pb-6">
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 block">Top Style</label>
                    <select id="top-style-select" onchange="changeStyle('topStyle', this.value)" class="w-full bg-slate-50 border border-slate-200 text-slate-700 py-2.5 px-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"></select>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 block">Bottom Style</label>
                    <select id="bottom-style-select" onchange="changeStyle('bottomStyle', this.value)" class="w-full bg-slate-50 border border-slate-200 text-slate-700 py-2.5 px-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"></select>
                </div>
                <div>
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 block">Footwear</label>
                    <select id="shoe-style-select" onchange="changeStyle('shoeStyle', this.value)" class="w-full bg-slate-50 border border-slate-200 text-slate-700 py-2.5 px-3 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none"></select>
                </div>
            </div>

            <!-- Color Swatches -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 border-b border-slate-100 pb-6">
                <div>
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 block">Top Color</span>
                    <div id="top-swatches" class="flex flex-wrap gap-2"></div>
                </div>
                <div>
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 block">Bottom Color</span>
                    <div id="bottom-swatches" class="flex flex-wrap gap-2"></div>
                </div>
                <div>
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 block">Shoe Color</span>
                    <div id="shoe-swatches" class="flex flex-wrap gap-2"></div>
                </div>
            </div>

            <!-- Style Verdict Box -->
            <div class="p-5 bg-indigo-50 border border-indigo-100 rounded-2xl flex flex-col sm:flex-row items-center sm:items-start gap-4 text-center sm:text-left">
                <div class="text-indigo-500 text-4xl mt-1">✨</div>
                <div>
                    <h3 id="vibe-title" class="text-base font-bold text-indigo-900 uppercase tracking-wide mb-1">Loading Vibe...</h3>
                    <p id="style-tip" class="text-indigo-800 text-sm font-medium leading-relaxed"></p>
                </div>
            </div>

        </div>
    </main>

    <!-- JavaScript Logic -->
    <script>
        /* =========================================
           1. PATH DEFINITIONS (Male & Female Data)
           ========================================= */
        const svgData = {
            male: {
                // Base mannequin
                body: "M 100 12 A 15 15 0 1 0 100 42 A 15 15 0 1 0 100 12 Z M 92 45 L 108 45 L 110 70 L 90 70 Z M 60 70 L 140 70 L 150 145 L 135 150 L 125 90 L 125 190 L 75 190 L 75 90 L 65 150 L 50 145 Z M 75 190 L 125 190 L 130 320 L 110 320 L 100 230 L 90 320 L 70 320 Z",
                tops: {
                    tshirt: "M 60 70 L 140 70 L 150 110 L 135 115 L 125 90 L 125 195 L 75 195 L 75 90 L 65 115 L 50 110 Z",
                    shirt: "M 60 70 L 140 70 L 150 155 L 135 160 L 125 90 L 125 200 L 75 200 L 75 90 L 65 160 L 50 155 Z",
                    kurta: "M 60 70 L 140 70 L 150 155 L 135 160 L 125 90 L 125 250 L 75 250 L 75 90 L 65 160 L 50 155 Z",
                    sherwani: "M 60 70 L 140 70 L 150 155 L 135 160 L 125 90 L 125 260 L 100 260 L 100 90 M 100 260 L 75 260 L 75 90 L 65 160 L 50 155 Z"
                },
                bottoms: {
                    trousers: "M 74 190 L 126 190 L 132 322 L 108 322 L 100 220 L 92 322 L 68 322 Z",
                    jeans: "M 74 190 L 126 190 L 135 322 L 110 322 L 100 220 L 90 322 L 65 322 Z",
                    dhoti: "M 74 190 L 126 190 L 145 260 L 120 290 L 100 240 L 80 290 L 55 260 Z",
                    churidar: "M 74 190 L 126 190 L 130 260 L 112 325 L 100 220 L 88 325 L 70 260 Z"
                },
                shoes: {
                    sneakers: "M 65 320 L 95 320 L 95 345 L 55 345 Q 55 325 65 320 M 105 320 L 135 320 Q 145 325 145 345 L 105 345 Z",
                    formal: "M 68 320 L 93 320 L 93 340 L 55 340 Q 60 325 68 320 M 107 320 L 132 320 Q 140 325 145 340 L 107 340 Z",
                    mojari: "M 60 320 L 95 320 L 95 340 L 50 340 Q 40 330 45 320 Q 55 330 60 320 M 105 320 L 140 320 Q 145 330 155 320 Q 160 330 150 340 L 105 340 Z"
                }
            },
            female: {
                // Base mannequin with feminine proportions
                body: "M 100 14 A 14 14 0 1 0 100 42 A 14 14 0 1 0 100 14 Z M 94 45 L 106 45 L 108 70 L 92 70 Z M 70 70 L 130 70 L 140 135 L 128 140 L 120 90 L 120 140 L 125 190 L 75 190 L 80 140 L 80 90 L 72 140 L 60 135 Z M 75 190 L 125 190 L 135 320 L 110 320 L 100 230 L 90 320 L 65 320 Z",
                tops: {
                    croptop: "M 70 70 L 130 70 L 140 105 L 128 110 L 120 90 L 118 140 L 82 140 L 80 90 L 72 110 L 60 105 Z",
                    kurti: "M 70 70 L 130 70 L 140 145 L 128 150 L 120 90 L 122 245 L 78 245 L 80 90 L 72 150 L 60 145 Z",
                    tshirt: "M 70 70 L 130 70 L 140 110 L 128 115 L 120 90 L 122 185 L 78 185 L 80 90 L 72 115 L 60 110 Z"
                },
                bottoms: {
                    lehenga: "M 70 175 L 130 175 L 165 325 L 35 325 Z",
                    salwar: "M 74 190 L 126 190 L 145 290 L 115 322 L 100 220 L 85 322 L 55 290 Z",
                    jeans: "M 74 190 L 126 190 L 138 322 L 110 322 L 100 220 L 90 322 L 62 322 Z",
                    churidar: "M 74 190 L 126 190 L 130 260 L 112 325 L 100 220 L 88 325 L 70 260 Z"
                },
                shoes: {
                    heels: "M 75 320 L 95 320 L 95 345 L 90 345 L 85 335 L 55 340 Q 65 325 75 320 M 105 320 L 125 320 Q 135 325 145 340 L 115 335 L 110 345 L 105 345 Z",
                    flats: "M 65 320 L 93 320 L 93 335 L 55 335 Q 60 325 65 320 M 107 320 L 135 320 Q 140 325 145 335 L 107 335 Z",
                    mojari: "M 65 320 L 95 320 L 95 338 L 50 338 Q 40 328 45 320 Q 55 330 65 320 M 105 320 L 135 320 Q 145 330 155 320 Q 160 328 150 338 L 105 338 Z"
                }
            }
        };

        const displayNames = {
            tshirt: "T-Shirt", shirt: "Button-Down", kurta: "Kurta", sherwani: "Sherwani",
            croptop: "Crop Top / Blouse", kurti: "Kurti / Tunic",
            trousers: "Trousers", jeans: "Jeans", dhoti: "Dhoti",
            churidar: "Churidar", lehenga: "Lehenga / Skirt", salwar: "Salwar",
            sneakers: "Sneakers", formal: "Formal Shoes", mojari: "Mojari / Jutti",
            heels: "Heels / Sandals", flats: "Flats"
        };

        /* =========================================
           2. UNIVERSAL COLOR PALETTE
           ========================================= */
        const universalColors =[
            { name: 'White', hex: '#f8fafc' }, { name: 'Black', hex: '#1e293b' },
            { name: 'Navy', hex: '#172554' }, { name: 'Maroon', hex: '#7f1d1d' },
            { name: 'Emerald', hex: '#064e3b' }, { name: 'Mustard', hex: '#ca8a04' },
            { name: 'Gold', hex: '#fbbf24' }, { name: 'Blush', hex: '#fbcfe8' },
            { name: 'Teal', hex: '#0f766e' }, { name: 'Beige', hex: '#f5f5dc' },
            { name: 'Charcoal', hex: '#334155'}, { name: 'Denim', hex: '#3b82f6' }
        ];

        /* =========================================
           3. APPLICATION STATE
           ========================================= */
        let state = {
            gender: 'male',
            topStyle: 'kurta',
            bottomStyle: 'dhoti',
            shoeStyle: 'mojari',
            topColor: universalColors[0],    // White
            bottomColor: universalColors[9], // Beige
            shoeColor: universalColors[3]    // Maroon
        };

        /* =========================================
           4. ALGORITHMIC STYLE VERDICT
           ========================================= */
        function updateVerdict() {
            let vibe = "Eclectic Fusion";
            let tip = "A unique mix of styles! Own your confidence.";

            const tradTops = ['kurta', 'sherwani', 'kurti', 'croptop'];
            const tradBots = ['dhoti', 'churidar', 'lehenga', 'salwar'];
            
            const isTradTop = tradTops.includes(state.topStyle);
            const isTradBot = tradBots.includes(state.bottomStyle);

            // 1. Determine base style vibe
            if (isTradTop && isTradBot) {
                vibe = "Traditional Elegance";
                tip = "Perfect for weddings, festivals, and cultural events. Excellent choice!";
            } else if (isTradTop || isTradBot) {
                vibe = "Indo-Western Fusion";
                tip = "Blending Indian silhouettes with modern cuts. A very contemporary aesthetic.";
            } else {
                vibe = "Modern Casual";
                tip = "Clean, contemporary, and highly versatile for everyday wear.";
            }

            // 2. Apply Color Theory Modifiers
            const topColor = state.topColor.name;
            const botColor = state.bottomColor.name;
            const shoeColor = state.shoeColor.name;

            if (topColor === botColor) {
                vibe = "Monochrome " + vibe;
                tip = "Tonal dressing makes you look taller and incredibly put-together.";
            } else if ((topColor === 'White' && botColor === 'Black') || (topColor === 'Black' && botColor === 'White')) {
                vibe = "High Contrast " + vibe;
                tip = "A sharp, timeless contrast that never goes out of style.";
            } else if (topColor === 'Gold' || botColor === 'Gold' || shoeColor === 'Gold') {
                vibe = "Regal " + vibe;
                tip = "The gold accents add a luxurious, royal touch to your ensemble. Great for evening events.";
            }

            document.getElementById('vibe-title').innerText = vibe;
            document.getElementById('style-tip').innerText = tip;
        }

        /* =========================================
           5. RENDER LOGIC
           ========================================= */
        function renderSVG() {
            // Body
            document.getElementById('body-path').setAttribute('d', svgData[state.gender].body);
            // Garments
            document.getElementById('tops-path').setAttribute('d', svgData[state.gender].tops[state.topStyle]);
            document.getElementById('bottoms-path').setAttribute('d', svgData[state.gender].bottoms[state.bottomStyle]);
            document.getElementById('shoes-path').setAttribute('d', svgData[state.gender].shoes[state.shoeStyle]);
            
            // Colors
            document.getElementById('tops-path').setAttribute('fill', state.topColor.hex);
            document.getElementById('bottoms-path').setAttribute('fill', state.bottomColor.hex);
            document.getElementById('shoes-path').setAttribute('fill', state.shoeColor.hex);
            
            updateVerdict();
        }

        function populateDropdown(selectId, optionsDict, currentStateValue) {
            const select = document.getElementById(selectId);
            select.innerHTML = '';
            Object.keys(optionsDict).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.innerText = displayNames[key] || key;
                if(key === currentStateValue) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function setGender(gender) {
            state.gender = gender;
            
            // Update UI buttons
            const btnMale = document.getElementById('btn-male');
            const btnFemale = document.getElementById('btn-female');
            if (gender === 'male') {
                btnMale.className = "px-6 py-1.5 text-sm font-semibold rounded-full transition-colors bg-indigo-500 text-white shadow";
                btnFemale.className = "px-6 py-1.5 text-sm font-semibold rounded-full transition-colors text-slate-600 hover:bg-slate-100";
            } else {
                btnFemale.className = "px-6 py-1.5 text-sm font-semibold rounded-full transition-colors bg-pink-500 text-white shadow";
                btnMale.className = "px-6 py-1.5 text-sm font-semibold rounded-full transition-colors text-slate-600 hover:bg-slate-100";
            }

            // Reset to first available style for the new gender to avoid broken paths
            state.topStyle = Object.keys(svgData[gender].tops)[0];
            state.bottomStyle = Object.keys(svgData[gender].bottoms)[0];
            state.shoeStyle = Object.keys(svgData[gender].shoes)[0];

            populateDropdown('top-style-select', svgData[gender].tops, state.topStyle);
            populateDropdown('bottom-style-select', svgData[gender].bottoms, state.bottomStyle);
            populateDropdown('shoe-style-select', svgData[gender].shoes, state.shoeStyle);

            renderSVG();
        }

        function changeStyle(stateKey, newValue) {
            state[stateKey] = newValue;
            renderSVG();
        }

        function renderSwatches(containerId, colorKey) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; 

            universalColors.forEach(color => {
                const btn = document.createElement('button');
                const isSelected = state[colorKey].name === color.name;
                
                btn.className = `w-8 h-8 rounded-full shadow-sm border-2 flex-shrink-0 transition-all duration-200 
                    ${isSelected ? 'border-indigo-500 scale-125 ring-2 ring-indigo-200 z-10' : 'border-slate-200 hover:scale-110'}`;
                btn.style.backgroundColor = color.hex;
                btn.title = color.name;
                
                btn.onclick = () => {
                    state[colorKey] = color;
                    // Re-render UI to update rings and colors
                    renderSwatches('top-swatches', 'topColor');
                    renderSwatches('bottom-swatches', 'bottomColor');
                    renderSwatches('shoe-swatches', 'shoeColor');
                    renderSVG();
                };
                container.appendChild(btn);
            });
        }

        // Initialization
        function init() {
            setGender('male'); // This populates dropdowns and does the first renderSVG()
            renderSwatches('top-swatches', 'topColor');
            renderSwatches('bottom-swatches', 'bottomColor');
            renderSwatches('shoe-swatches', 'shoeColor');
        }

        // Run on load
        init();
    </script>
</body>
</html>
